name: CI

# Verifie que le build passe sur chaque PR (remplace le preview build Cloudflare).
on:
  pull_request:
    branches: [dev, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Auth GitHub Packages (Wara DS)
        run: echo "//npm.pkg.github.com/:_authToken=${{ secrets.WARA_DS_TOKEN }}" >> ~/.npmrc

      - run: npm ci

      - run: npm run build
