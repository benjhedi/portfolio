name: CI

# Verifie que le build passe sur chaque PR (remplace le preview build Cloudflare).
on:
  pull_request:
    branches: [dev, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Auth GitHub Packages pour les packages privés @warastudio.
      # Le scope/registry vient du .npmrc committé ; seul le token reste hors repo.
      - name: Auth GitHub Packages
        run: echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> ~/.npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.WARA_DS_TOKEN }}

      - run: npm ci

      - run: npm run build
