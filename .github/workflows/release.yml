name: Release to production

# Mise en production uniquement sur push d'un tag v* (ex: v1.0.0).
# Les pushes sur main ne declenchent plus la prod (a desactiver cote Cloudflare).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: production-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Auth GitHub Packages (Wara DS)
        run: echo "//npm.pkg.github.com/:_authToken=${{ secrets.WARA_DS_TOKEN }}" >> ~/.npmrc

      - run: npm ci

      - name: Build et deploie sur Cloudflare
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Cle Web3Forms du formulaire de contact : inlinee par Vite au build
          # (import.meta.env.VITE_*). Doit donc etre presente ICI, pas cote runtime.
          VITE_WEB3FORMS_ACCESS_KEY: ${{ secrets.WEB3FORMS_ACCESS_KEY }}

      - name: Cree la GitHub Release avec notes auto
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes --title "$GITHUB_REF_NAME" --verify-tag
