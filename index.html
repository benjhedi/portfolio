<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f7f4ed" />

    <title>Hedi Benjahouach, consultant iOS senior</title>
    <meta
      name="description"
      content="Consultant iOS senior freelance. Conception et développement d'applications iOS, de l'idée à la production. Missions chez TF1, France Télévisions et Décathlon."
    />

    <!-- Open Graph / partage de lien -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Hedi Benjahouach, consultant iOS senior" />
    <meta
      property="og:description"
      content="Conception et développement d'applications iOS, de l'idée à la production. Missions chez TF1, France Télévisions et Décathlon."
    />
    <meta property="og:locale" content="fr_FR" />
    <meta property="og:locale:alternate" content="en_US" />
    <meta name="twitter:card" content="summary_large_image" />

    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />

    <!-- Theme applique avant le premier rendu (evite le flash clair/sombre) -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var dark =
            stored === "dark" ||
            (!stored && matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
